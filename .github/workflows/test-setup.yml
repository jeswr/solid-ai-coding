name: Test Setup Script

on:
  push:
    branches: [main]
    paths:
      - 'setup-bob.js'
      - '.github/workflows/test-setup.yml'
  pull_request:
    branches: [main]
    paths:
      - 'setup-bob.js'
      - '.github/workflows/test-setup.yml'
  workflow_dispatch:

jobs:
  test-setup:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20, 22]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Create test directory
        shell: bash
        run: |
          mkdir -p test-workspace
          cd test-workspace

      - name: Run setup script
        shell: bash
        working-directory: test-workspace
        run: |
          node ../setup-bob.js
        env:
          CI: true

      - name: Verify AGENTS.md exists
        shell: bash
        working-directory: test-workspace
        run: |
          if [ ! -f "AGENTS.md" ]; then
            echo "❌ AGENTS.md not found"
            exit 1
          fi
          echo "✅ AGENTS.md exists"

      - name: Verify CLAUDE.md exists
        shell: bash
        working-directory: test-workspace
        run: |
          if [ ! -f "CLAUDE.md" ]; then
            echo "❌ CLAUDE.md not found"
            exit 1
          fi
          echo "✅ CLAUDE.md exists"

      - name: Verify MCP config exists
        shell: bash
        working-directory: test-workspace
        run: |
          if [ ! -f ".bob/mcp.json" ]; then
            echo "❌ .bob/mcp.json not found"
            exit 1
          fi
          echo "✅ .bob/mcp.json exists"

      - name: Verify MCP config content
        shell: bash
        working-directory: test-workspace
        run: |
          if ! grep -q "context7" .bob/mcp.json; then
            echo "❌ MCP config does not contain context7"
            exit 1
          fi
          echo "✅ MCP config is valid"

      - name: Verify Solid skills installed
        shell: bash
        working-directory: test-workspace
        run: |
          SKILLS=(
            "solid-fetch-rdf"
            "solid-object"
            "solid-reactive-authentication"
            "solid-server-matrix"
            "solid-type-index"
            "solid-scale-and-sharding"
            "solid-notifications"
            "accessible-html-links"
          )
          
          for skill in "${SKILLS[@]}"; do
            if [ ! -d ".bob/skills/$skill" ]; then
              echo "❌ Skill $skill not found"
              exit 1
            fi
            echo "✅ Skill $skill installed"
          done

      - name: Verify engineering skills installed
        shell: bash
        working-directory: test-workspace
        run: |
          SKILLS=(
            "vitest"
            "playwright-best-practices"
            "webapp-testing"
            "node"
            "typescript-advanced-types"
            "responsive-design"
            "semantic-html"
            "web-design-guidelines"
            "code-review-and-quality"
            "find-skills"
          )
          
          for skill in "${SKILLS[@]}"; do
            if [ ! -d ".bob/skills/$skill" ]; then
              echo "❌ Skill $skill not found"
              exit 1
            fi
            echo "✅ Skill $skill installed"
          done

      - name: Test script idempotency (re-run)
        shell: bash
        working-directory: test-workspace
        run: |
          echo "Testing that script can be run multiple times..."
          node ../setup-bob.js
        env:
          CI: true

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-workspace-${{ matrix.os }}-node${{ matrix.node-version }}
          path: test-workspace/
          retention-days: 7

  test-setup-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test-setup
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-setup.result }}" != "success" ]; then
            echo "❌ Setup script tests failed"
            exit 1
          fi
          echo "✅ All setup script tests passed"

# Made with Bob
